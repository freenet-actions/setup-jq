name: 'build-test-release'

on: 
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
    - 'README.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
      - name: 📦 Install Dependencies
        run: npm ci --ignore-scripts
      - name: 🚧 Run All Tests
        run: npm run all
      - name: ⬆️ Upload Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: action-package
          path: |
            action.yml
            dist/*

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: ⬇️ Download Artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: action-package
      - name: Run Test
        uses: ./

  release:
    if: github.event_name == 'workflow_dispatch'
    name: Publish New Release
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: ⬇️ Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: .nvmrc
    - name: 🚧 Build Release
      run: |
       git config --local user.email "action@github.com"
       git config --local user.name "GitHub Action"                    
       npm ci --ignore-scripts
       npm run build && npm run package
       git add dist
       git commit --allow-empty -m "new release"
       PACKAGE_VERSION=$(node -p "require('./package.json').version")
       MAIN_PACKAGE_VERSION=$(node -p "require('./package.json').version[0]")
       git tag -fa v$PACKAGE_VERSION -m "Update tag"
       git push origin v$PACKAGE_VERSION --force
       git tag -fa v$MAIN_PACKAGE_VERSION -m "Update tag"
       git push origin v$MAIN_PACKAGE_VERSION --force
    - name: ⚙️ Increment Version
      run: |
       npm version patch --force
       git push --force
