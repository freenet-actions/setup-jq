name: 'build-test-release'

on: 
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
    - 'README.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: 📦 Install Dependencies
        run: npm ci --ignore-scripts
      - name: 🚧 Run All Tests
        run: npm run all
      - name: ⬆️ Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: action-package
          path: |
            action.yml
            dist/*

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: ⬇️ Download Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: action-package
      - name: Run Test
        uses: ./

  release:
    if: github.event_name == 'workflow_dispatch'
    name: Publish New Release
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: ⬇️ Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .nvmrc
    - name: 🚧 Build Release
      run: |
       git config --local user.email "action@github.com"
       git config --local user.name "GitHub Action"                    
       npm ci --ignore-scripts
       npm run build && npm run package
       git add dist
       git commit --allow-empty -m "new release"
       PACKAGE_VERSION=$(node -p "require('./package.json').version")
       MAIN_PACKAGE_VERSION=$(node -p "require('./package.json').version[0]")
       git tag -fa v$PACKAGE_VERSION -m "Update tag"
       git push origin v$PACKAGE_VERSION --force
       git tag -fa v$MAIN_PACKAGE_VERSION -m "Update tag"
       git push origin v$MAIN_PACKAGE_VERSION --force
    - name: ⚙️ Increment Version
      run: |
       npm version patch --force
       git push --force
